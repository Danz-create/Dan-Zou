{% include base_path %}

<div class="masthead{% if page.url != '/' %} masthead--inner{% endif %}">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="simple-nav" aria-label="Main navigation">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <ul class="simple-nav__links">
          {% for link in site.data.navigation.main %}
            <li><a href="{{ link.url | relative_url }}"{% if page.url == link.url %} class="active"{% endif %}>{{ link.title }}</a></li>
          {% endfor %}
        </ul>
      </nav>
    </div>
  </div>
</div>
